volumes:
  pg_data:
  static:
  media:
  frontend_build:

services:
  db:
    image: postgres:13
    env_file: .env
    volumes:
      - pg_data/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${DOCKERHUB_USERNAME}/kittygram_backend:latest
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static:/app/collected_static
      - media:/app/media
    command: >
      sh -c "python manage.py migrate &&
             gunicorn kittygram_backend.wsgi:application --bind 0.0.0.0:8000"

  gateway:
    image: ${DOCKERHUB_USERNAME}/kittygram_gateway:latest
    env_file: .env
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - frontend_build:/app/frontend_build
      - static:/app/static
      - media:/app/media
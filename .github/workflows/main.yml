name: Kittygram CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}

jobs:

  backend_tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: kittygram_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: kittygram_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          cd backend
	        python -m pip install --upgrade pip 
          pip install -r requirements.txt
          pip install ruff
      - name: Run ruff check
        run: |
          cd backend
          ruff check .
      - name: Run tests
        run: |
          cd backend
          python manage.py test
        env:
          DJANGO_SECRET_KEY: test-key
          ALLOWED_HOSTS: localhost
          POSTGRES_DB: kittygram_test
          POSTGRES_USER: kittygram_user
          POSTGRES_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432
          DEBUG: False

  frontend_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install and test frontend
        run: |
          cd frontend
          npm ci
          npm run test

 
  build_and_push:
    needs: [backend_tests, frontend_tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/kittygram_backend:latest
      
      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/kittygram_frontend:latest
      
      - name: Build and push gateway
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest

 
  send_message:
    needs: [build_and_push]
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main' 
    steps:
      - name: Send Message
        run: |
          MESSAGE="✅ Kittygram CI/CD завершён!
          👤 Автор: ${{ github.actor }}
          💬 Коммит: ${{ github.event.commits[0].message }}
          🔗 Коммит: https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          
          curl -s -X POST https://api.telegram.org/bot${{ env.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ env.TELEGRAM_TO }} \
            -d text="$MESSAGE" \
            -d parse_mode=HTML
server {
  listen 80;
  server_tokens off;
  server_name localhost;
  client_max_body_size 10M;
	
  location /api/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $http_host;
  }

  location /admin/ {
    proxy_pass http://backend:8000/admin/;
    proxy_set_header Host $http_host;
  }

  location /static/ {
    alias /app/static/;
  }

  location /media/ {
    alias /app/media/;
  }

  location / {
    alias /app/static/;
    try_files $uri $uri/ /index.html;      
  }
}
